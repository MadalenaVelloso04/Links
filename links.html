<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Madalena Velloso</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #111;
     font-family: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', Menlo, Consolas, monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    .profile {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #111;
      overflow: hidden;
      margin: 0 auto 1rem;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .name {
      font-size: 17px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 12px;
      color: #888;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border: 0.5px solid #111;
      border-radius: 50%;
      text-decoration: none;
      color: #111;
      background: transparent;
      transition: background 0.15s, color 0.15s;
    }

    .link:hover {
      background: #111;
      color: #fff;
    }

    .link-label {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .link-arrow {
      font-size: 13px;
      opacity: 0.5;
    }

    .link:hover .link-arrow {
      opacity: 1;
    }

    .footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 11px;
      color: #bbb;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="profile">
      <div class="avatar">
        <img src="images/EDEA9F8C-7800-4EC1-B1E3-ED4AEF18BFC2.jpg" alt="">
      </div>
      <p class="name">naoseique.etal aka Madalena Velloso</p>
      <p class="tagline">Graphic Designer</p>
    </div>

    <div class="links">
      <a class="link" href="https://madalenavelloso04.github.io/Mada25/" target="_blank" rel="noopener">
        <span class="link-label">Portfolio</span>
        <span class="link-arrow">↗</span>
      </a>
      <a class="link" href="https://www.instagram.com/naoseique.etal/" target="_blank" rel="noopener">
        <span class="link-label">Instagram</span>
        <span class="link-arrow">↗</span>
      </a>
      <a class="link" href="https://form.typeform.com/to/sSFEIfzK" target="_blank" rel="noopener">
        <span class="link-label">Inquiry form</span>
        <span class="link-arrow">↗</span>
      </a>
      <a class="link" href="mailto:madalenavelloso04@gmail.com">
        <span class="link-label">Contact</span>
        <span class="link-arrow">↗</span>
      </a>
    </div>

    <p class="footer">Lisbon · 2026</p>

  </div>
</body>
</html>
